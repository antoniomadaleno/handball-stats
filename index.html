<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handball Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- ── HEADER ── -->
<div id="header">
  <div class="logo" onclick="app.goHome()">🤾 HS</div>
  <div id="breadcrumb"></div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar" class="hidden">
    <div class="sidebar-season">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div id="sb-badge" class="team-badge"></div>
        <div>
          <div class="sidebar-season-label">Época</div>
          <div class="sidebar-season-name" id="sb-season-name">—</div>
        </div>
      </div>
      <div id="sb-team-name" style="font-size:12px;color:var(--text2)"></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="app.showSec('info')"      id="nav-info">      <span class="nav-icon">⚙️</span> Informações</div>
      <div class="nav-item"        onclick="app.showSec('players')"   id="nav-players">   <span class="nav-icon">👤</span> Plantel</div>
      <div class="nav-item"        onclick="app.showSec('opponents')" id="nav-opponents"> <span class="nav-icon">🛡️</span> Adversários</div>
      <div class="nav-item"        onclick="app.showSec('matches')"   id="nav-matches">   <span class="nav-icon">🏐</span> Jogos</div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-warn btn-sm" style="width:100%;justify-content:center" id="sb-end-btn" onclick="app.toggleSeasonEnded()">Terminar época</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <!-- ══ HOME ══ -->
    <div id="page-home" class="page active"></div>

    <!-- ══ SEASON ══ -->
    <div id="page-season" class="page"></div>
  </div>

</div><!-- /app -->

<div id="toast"></div>

<!-- ══ MODAIS (container) ══ -->
<div id="modals-container"></div>

<!-- ══ ENTRY POINT ══ -->
<script>
// Proxy para garantir que app.xxx() funciona mesmo antes do módulo carregar
window._appQueue = [];
window.app = new Proxy({}, {
  get(_, key) {
    return (...args) => {
      if (window._appReady && window._appReady[key]) {
        return window._appReady[key](...args);
      }
      window._appQueue.push({ key, args });
    };
  }
});
</script>

<script type="module">
// ── Carrega os fragmentos HTML ──────────────
async function loadHTML(url, containerId) {
  const res  = await fetch(url);
  const html = await res.text();
  document.getElementById(containerId).insertAdjacentHTML('beforeend', html);
}

const sections = [
  ['html/sections/home.html',      'page-home'],
  ['html/sections/info.html',      'page-season'],
  ['html/sections/players.html',   'page-season'],
  ['html/sections/opponents.html', 'page-season'],
  ['html/sections/matches.html',   'page-season'],
];

const modals = [
  'html/modals/modal-player.html',
  'html/modals/modal-opponent.html',
  'html/modals/modal-match.html',
  'html/modals/modal-opp-player.html',
  'html/modals/modal-location.html',
  'html/modals/modal-timer.html',
];

// Carrega tudo em paralelo
await Promise.all([
  ...sections.map(([url, id]) => loadHTML(url, id)),
  ...modals.map(url => loadHTML(url, 'modals-container')),
]);

// Carrega o módulo JS depois do HTML estar no DOM
const mod = await import('./js/app.js');
window._appReady = mod.app;

// Drena a fila de chamadas que chegaram antes do módulo
(window._appQueue || []).forEach(({ key, args }) => {
  if (mod.app[key]) mod.app[key](...args);
});
window._appQueue = [];
</script>

</body>
</html>
