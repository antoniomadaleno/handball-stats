<!-- Modal: Localização remate -->
<div class="modal-backdrop" id="modal-location" style="align-items:stretch;padding:0">
  <div style="background:#0a0a18;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
      <button onclick="app.locSkip()"   style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:2px 8px;line-height:1">✕</button>
      <div style="font-family:var(--font-cond);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px" id="loc-action-label"></div>
      <button onclick="app.locConfirm()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:2px 8px;line-height:1">✓</button>
    </div>

    <!-- Seletor jogador adversário -->
    <div id="loc-opp-section" style="display:none;flex-shrink:0;padding:6px 16px 0">
      <div id="loc-opp-label" style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Quem rematou? (opcional)</div>
      <div id="loc-opp-list" style="display:flex;gap:6px;flex-wrap:wrap;overflow-y:auto;max-height:90px"></div>
    </div>

    <!-- Baliza -->
    <div id="loc-goal-section" style="flex-shrink:0;padding:8px 16px 4px">
      <div style="position:relative;cursor:crosshair" onclick="app.locGoalClick(event)">
        <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:160px;display:block;border-radius:4px">
          <rect x="0"   y="0"   width="500" height="200" fill="#0a0a18"/>
          <rect x="90"  y="20"  width="320" height="140" fill="#111128"/>
          <line x1="197" y1="20"  x2="197" y2="160" stroke="#222245" stroke-width="2"/>
          <line x1="303" y1="20"  x2="303" y2="160" stroke="#222245" stroke-width="2"/>
          <line x1="90"  y1="67"  x2="410" y2="67"  stroke="#222245" stroke-width="2"/>
          <line x1="90"  y1="113" x2="410" y2="113" stroke="#222245" stroke-width="2"/>
          <rect x="85"  y="16" width="8"   height="148" fill="#4a9a6a" rx="2"/>
          <rect x="407" y="16" width="8"   height="148" fill="#4a9a6a" rx="2"/>
          <rect x="85"  y="16" width="330" height="8"   fill="#4a9a6a" rx="2"/>
          <line x1="0"   y1="20"  x2="85"  y2="20"  stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="415" y1="20"  x2="500" y2="20"  stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="0"   y1="164" x2="85"  y2="164" stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="415" y1="164" x2="500" y2="164" stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="0"   y1="20"  x2="0"   y2="164" stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="500" y1="20"  x2="500" y2="164" stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="85"  y1="0"   x2="85"  y2="20"  stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="415" y1="0"   x2="415" y2="20"  stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="85"  y1="164" x2="85"  y2="200" stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
          <line x1="415" y1="164" x2="415" y2="200" stroke="#1e1e3a" stroke-width="1" stroke-dasharray="5,4"/>
        </svg>
        <div id="loc-goal-dot" style="display:none;position:absolute;width:14px;height:14px;border-radius:50%;background:#e8c84a;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,0.6);transform:translate(-50%,-50%);pointer-events:none"></div>
      </div>
    </div>

    <!-- Campo -->
    <div style="flex:1;padding:2px 16px 10px;min-height:0;display:flex;flex-direction:column">
      <div style="position:relative;cursor:crosshair;flex:1;border-radius:4px;overflow:hidden" onclick="app.locFieldClick(event)">
        <img src="pictures/handball_court.png" style="width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;background:#000" />
        <div id="loc-field-dot" style="display:none;position:absolute;width:16px;height:16px;border-radius:50%;background:#e8c84a;border:2px solid white;box-shadow:0 0 8px rgba(0,0,0,0.8);transform:translate(-50%,-50%);pointer-events:none"></div>
      </div>
    </div>

  </div>
</div>
